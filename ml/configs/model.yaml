
# ===============================================================
#  MODEL CYCLE CONFIGURATION
#  This file controls the entire model training / selection logic
# ===============================================================

dataset:
  processed_path: ml/data/features/nba_features.parquet
  target_col: TARGET_5Yrs
  id_col: Name

# ===============================================================
#  FEATURE PIPELINE CONFIG
# ===============================================================
features:

  # -----------------------------------------
  # Columns produced by the Feature Cycle
  # -----------------------------------------
  all_base_features:
    - GP
    - MIN
    - PTS
    - FGM
    - FGA
    - FG%
    - 3P Made
    - 3PA
    - 3P%
    - FTM
    - FTA
    - FT%
    - OREB
    - DREB
    - REB
    - AST
    - STL
    - BLK
    - TOV

  all_engineered_features:
    - PTS_per_MIN
    - FGM_per_FGA
    - FT_per_FTA
    - ThreePA_rate
    - FT_rate
    - Usage_proxy
    - AST_to_TOV
    - REB_per_MIN
    - OREB_share
    - DREB_share

  # Use ALL features by default
  selected_for_training:
    use: all

  # -----------------------------------------
  # SKewness-Based Feature Transformations
  # -----------------------------------------
  transformations:
    skewness_report_csv: ml/reports/eda/skewness_report.csv

  # -----------------------------------------
  # SCALING
  # -----------------------------------------
  scaling:
    enabled: true
    scaler: standard   # [standard | minmax | robust]

  # -----------------------------------------
  # FEATURE SELECTION
  # -----------------------------------------
  selection:
    enabled: true
    method: rf_importance    # [rf_importance | kbest | none]
    top_k: 15

    corr_prune: true
    corr_threshold: 0.90

    always_keep:
      - GP
      - MIN
      - PTS

# ===============================================================
#  REPRODUCIBILITY
# ===============================================================
reproducibility:
  random_state: 42
  test_size: 0.20
  val_size: 0.20

# ===============================================================
#  CLASS IMBALANCE HANDLING
# ===============================================================
class_imbalance:
  enabled: true
  method: smote      # [smote | class_weight | scale_pos_weight]

  smote:
    k_neighbors: 5

  # Used dynamically for XGB
  min_positive_rate: 0.05

# ===============================================================
#  MODEL CANDIDATES (MODEL SELECTION)
# ===============================================================
model:
  candidates:

    - name: rf
      type: random_forest
      params:
        n_estimators: 500
        max_depth: 8
        min_samples_leaf: 2
        n_jobs: -1
      scoring_methods:
        - kfold
        - optim
        - optuna

    - name: brf
      type: balanced_random_forest
      params:
        n_estimators: 500
        max_depth: 8
        min_samples_leaf: 2
        n_jobs: -1
      scoring_methods:
        - kfold
        - optim
        - optuna

    - name: xgb
      type: xgboost
      use_scale_pos_weight: true
      params:
        n_estimators: 400
        max_depth: 5
        learning_rate: 0.05
        subsample: 0.9
        colsample_bytree: 0.9
        n_jobs: -1
      scoring_methods:
        - kfold
        - optim
        - optuna

  optuna:
    enabled: true
    n_trials: 25


# ===============================================================
#  CROSS-VALIDATION SETTINGS
# ===============================================================
cv:
  enabled: true
  n_splits: 5
  shuffle: true

# ===============================================================
#  METRICS & EVALUATION
# ===============================================================
metrics:
  primary: balanced_accuracy     # used for threshold tuning & CV comparison
  extra:
    - recall
    - accuracy
    - roc_auc
    - precision

threshold_optimization:
  enabled: true
  metric: f1

# ===============================================================
#  OUTPUTS
# ===============================================================
outputs:
  model_dir: ml/models
  best_model_filename: nba_best_model.joblib
  metrics_report: ml/reports/model_metrics.json
  cv_report: ml/reports/model_cv_report.json
  candidate_report: ml/reports/model_candidates.json
  shap_dir: ml/reports/shap
  package_root: ml/packaging/packages
  model_card_path: ml/models/MODEL_CARD.md

# ===============================================================
#  VALIDATION GATE 
# ===============================================================
validation_gates:
  min_f1: 0.70          # must reach at least this F1 on test
  min_recall: 0.65      # avoid missing too many positives
  #max_drop_vs_previous: 0.05  
  #previous_f1 #compare to a baseline model.



# ===============================================================
#  MODEL REGISTRY / VERSIONING
# ===============================================================
registry:
  mlflow_tracking_uri: "mlruns" # local tracking dir (or remote URI)
  experiment_name: "nba_career_prediction"
  register_best: true                    # turn registry ON/OFF
  model_name: "nba_career_model"         # name in MLflow Model Registry
  stage: "Staging"                       # Staging | Production | None

# ===============================================================
#  RUN METADATA
# ===============================================================
run_metadata:
  save_manifest: true
  manifest_path: ml/reports/model_run_manifest.json




