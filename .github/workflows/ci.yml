name: CI - Continuous Testing

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest -v

      - name: Smoke test Python imports
        run: |
          python -c "import app.main; import app.model_loader; import app.predict; import app.schemas; print('✅ App imports OK')"

      - name: Validate Docker build
        run: docker build -t nba-longevity:test .